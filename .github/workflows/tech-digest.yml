name: TRaid Tech Digest

# Free cloud delivery of the AI tech-scene digest — runs even when your Mac is off.
# Runs weekdays at 21:00 UTC = 6pm Argentina time (1h after US close).
# GitHub Actions is free for this (a ~1-min job once a day).
on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}   # also lets you trigger it by hand to test

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance
      - name: Send tech digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ secrets.GROK_MODEL }}
        run: python tools/watchdog.py --tech-digest
